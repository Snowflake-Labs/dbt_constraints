[pytest]
# Pytest configuration for dbt_constraints automated tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    fast: marks tests for fast validation mode
    postgres: PostgreSQL-specific tests
    oracle: Oracle-specific tests
    sqlserver: SQL Server-specific tests
    snowflake: Snowflake-specific tests
    issue_105: tests for issue #105 (custom naming macros)

# Timeout
timeout = 600

# Log settings
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
