services:
  postgres:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dbt-test}-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dbt_test}"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

networks:
  test-network:
    name: ${COMPOSE_PROJECT_NAME:-dbt-test}-network
    driver: bridge
