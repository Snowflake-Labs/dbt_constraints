services:
  dbt-sqlserver:
    build:
      context: ../../../../
      dockerfile: integration_tests/automated_tests/docker/build/Dockerfile
      args:
        DBT_ADAPTER: sqlserver
        DBT_VERSION: ${DBT_VERSION:-1.9.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dbt-test}-dbt-sqlserver
    environment:
      DBT_TARGET: sqlserver
      DBT_PROJECT_DIR: /project/integration_tests
      DBT_PROFILES_DIR: /project/integration_tests/.dockerenv
      SQLSERVER_HOST: dbt-test-db-sqlserver
      SQLSERVER_PORT: 1433
      SQLSERVER_USER: sa
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD}
      SQLSERVER_DATABASE: ${SQLSERVER_DATABASE}
    volumes:
      - ../../../../:/project
      - ../../../.dockerenv:/project/integration_tests/.dockerenv
    networks:
      - test-network
    working_dir: /project/integration_tests

networks:
  test-network:
    name: dbt-test-db-network
    external: true
