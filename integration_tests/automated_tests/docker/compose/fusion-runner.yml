services:
  dbt-fusion:
    build:
      context: ../../../../
      dockerfile: integration_tests/automated_tests/docker/build/Dockerfile.fusion
      args:
        DBT_VERSION: ${DBT_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-dbt-test}-dbt-fusion
    environment:
      DBT_TARGET: snowflake
      DBT_PROJECT_DIR: /project/integration_tests/dbt-fusion
      DBT_PROFILES_DIR: /project/integration_tests/dbt-fusion
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
      SNOWFLAKE_PRIVATE_KEY_PATH: ${SNOWFLAKE_PRIVATE_KEY_PATH:-}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-dbt_constraints_test}
      SNOWFLAKE_THREADS: ${SNOWFLAKE_THREADS:-8}
    volumes:
      - ../../../../:/project
      - ${HOME}/.ssh:${HOME}/.ssh:ro
    working_dir: /project/integration_tests/dbt-fusion
